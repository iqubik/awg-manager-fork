name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##refs/tags/}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  release-check:
    name: Check existing release
    runs-on: ubuntu-latest
    needs: [version]
    outputs:
      release_exists: ${{ steps.check.outputs.release_exists }}
    steps:
      - name: Detect existing GitHub release for tag
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            required_assets=(
              "VERSION"
              "CHANGELOG.md"
              "awg-manager_${VERSION}_mipsel-3.4-kn.ipk"
              "awg-manager_${VERSION}_mips-3.4-kn.ipk"
              "awg-manager_${VERSION}_aarch64-3.10-kn.ipk"
            )

            existing_assets="$(
              gh release view "$TAG" \
                --repo "$GITHUB_REPOSITORY" \
                --json assets \
                --jq '.assets[].name'
            )"

            missing=()
            for asset in "${required_assets[@]}"; do
              if ! grep -Fxq "$asset" <<<"$existing_assets"; then
                missing+=("$asset")
              fi
            done

            if ((${#missing[@]} > 0)); then
              echo "::error::Release $TAG already exists but is missing required assets:"
              printf ' - %s\n' "${missing[@]}"
              exit 1
            fi

            echo "Release $TAG already exists with all required assets; build/test/publish will be skipped."
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [version, release-check]
    if: needs.release-check.outputs.release_exists != 'true'
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [mipsel-3.4, mips-3.4, aarch64-3.10]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4

      - name: Install frontend deps + build
        working-directory: frontend
        run: |
          npm ci
          node scripts/generate-brand-icons.mjs
          git diff --exit-code src/lib/generated/brandIcons.ts \
            || { echo "::error::brandIcons.ts is stale — run 'node scripts/generate-brand-icons.mjs' and commit"; exit 1; }
          npm run build

      - name: Build .ipk
        env:
          IPK_VERSION: ${{ needs.version.outputs.version }}
          AWG_RELEASE_REPO_URL: https://github.com/iqubik/awg-manager-fork/releases
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          echo "$IPK_VERSION" > dist/VERSION
          SKIP_FRONTEND_BUILD=1 AWG_RELEASE_REPO_URL="$AWG_RELEASE_REPO_URL" \
            ./scripts/build-ipk.sh "$IPK_VERSION" "${{ matrix.arch }}"

      - name: Verify embedded release URL
        env:
          IPK_VERSION: ${{ needs.version.outputs.version }}
          AWG_RELEASE_REPO_URL: https://github.com/iqubik/awg-manager-fork/releases
        shell: bash
        run: |
          set -euo pipefail
          test -f build/bin/awg-manager
          strings build/bin/awg-manager | grep -F "$AWG_RELEASE_REPO_URL"

          ipk="dist/awg-manager_${IPK_VERSION}_${{ matrix.arch }}-kn.ipk"
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cp "$ipk" "$workdir/pkg.ipk"
          cd "$workdir"
          tar -xzf pkg.ipk
          test -f data.tar.gz
          tar -xzf data.tar.gz
          strings ./opt/bin/awg-manager | grep -F "$AWG_RELEASE_REPO_URL"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ipk-${{ matrix.arch }}
          path: dist/awg-manager_*_${{ matrix.arch }}-kn.ipk
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [release-check, build]
    if: needs.release-check.outputs.release_exists != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4
      - run: go test ./...
      - working-directory: frontend
        run: |
          npm ci
          npx vitest run

  catalog-drift:
    name: Preset catalog drift-check
    runs-on: ubuntu-latest
    needs: [version, release-check]
    if: needs.release-check.outputs.release_exists != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.4
      - name: Host sing-box (pinned RequiredVersion)
        shell: bash
        run: |
          set -euo pipefail
          ver="$(sed -n 's/^const RequiredVersion = "\(.*\)"/\1/p' internal/singbox/installer/embedded.go)"
          curl -fsSL -o /tmp/sb.tgz "https://github.com/SagerNet/sing-box/releases/download/v${ver}/sing-box-${ver}-linux-amd64.tar.gz"
          tar -xzf /tmp/sb.tgz -C /tmp
          echo "SB=$(find /tmp -type f -name sing-box -path "*${ver}-linux-amd64*" | head -1)" >> "$GITHUB_ENV"
      - name: Regenerate + assert no drift
        shell: bash
        run: |
          set -euo pipefail
          go run ./tools/genpresets -singbox "$SB"
          git diff --exit-code internal/presets/defaults.json \
            || { echo "::error::defaults.json is stale vs the pinned .srs — run 'go run ./tools/genpresets -singbox <sb>' and commit"; exit 1; }

  publish:
    name: Publish stable release
    runs-on: ubuntu-latest
    needs: [version, release-check, build, test, catalog-drift]
    if: needs.release-check.outputs.release_exists != 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Download all .ipk
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: ipk-*
          path: dist
          merge-multiple: true
      - name: Extract changelog section
        env:
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          extract_section() {
            local version="$1"
            awk -v hdr="## [$version] - " '
              index($0, hdr) == 1 { capture=1; next }
              capture && index($0, "## [") == 1 { exit }
              capture { print }
            ' CHANGELOG.md | sed -E '1{/^$/d;}' | sed -E '${/^$/d;}'
          }

          lookup="$VERSION"
          lookup_no_rev="${lookup%%+r*}"

          notes="$(extract_section "$lookup")"
          used="$lookup"

          if [[ -z "$notes" && "$lookup_no_rev" != "$lookup" ]]; then
            notes="$(extract_section "$lookup_no_rev")"
            used="$lookup_no_rev"
          fi

          if [[ -z "$notes" && "$lookup_no_rev" =~ ^([0-9]+\.[0-9]+\.[0-9]+)\.[0-9]+$ ]]; then
            base="${BASH_REMATCH[1]}"
            notes="$(extract_section "$base")"
            used="$base"
          fi

          if [[ -z "$notes" ]]; then
            echo "No CHANGELOG section for $VERSION" >&2
            echo "Available sections:" >&2
            grep -E '^## \[[^]]+\] - ' CHANGELOG.md >&2 || true
            exit 1
          fi

          if [[ "$used" != "$VERSION" ]]; then
            {
              echo "Stable release: $VERSION"
              echo
              echo "Based on changelog section: $used"
              echo
              printf '%s\n' "$notes"
            } > /tmp/notes.md
          else
            printf '%s\n' "$notes" > /tmp/notes.md
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/release-assets
          printf '%s\n' "$VERSION" > /tmp/release-assets/VERSION
          cp CHANGELOG.md /tmp/release-assets/CHANGELOG.md
          # Auto-detect prerelease by suffix (rc/alpha/beta/dev).
          extra=()
          if [[ "$TAG" =~ -(rc|beta|alpha|dev) ]]; then
            extra+=(--prerelease)
          fi
          gh release create "$TAG" \
            ./dist/awg-manager_*.ipk \
            /tmp/release-assets/CHANGELOG.md \
            /tmp/release-assets/VERSION \
            --title "$TAG" \
            --notes-file /tmp/notes.md \
            "${extra[@]}"

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --json isDraft,isPrerelease,tagName,name,url,assets

          checkdir="$(mktemp -d)"
          trap 'rm -rf "$checkdir"' EXIT

          gh release download "$TAG" --pattern VERSION --dir "$checkdir"
          gh release download "$TAG" --pattern CHANGELOG.md --dir "$checkdir"
          gh release download "$TAG" --pattern "awg-manager_${VERSION}_mipsel-3.4-kn.ipk" --dir "$checkdir"
          gh release download "$TAG" --pattern "awg-manager_${VERSION}_mips-3.4-kn.ipk" --dir "$checkdir"
          gh release download "$TAG" --pattern "awg-manager_${VERSION}_aarch64-3.10-kn.ipk" --dir "$checkdir"

          test -f "$checkdir/VERSION"
          test -f "$checkdir/CHANGELOG.md"
          test -f "$checkdir/awg-manager_${VERSION}_mipsel-3.4-kn.ipk"
          test -f "$checkdir/awg-manager_${VERSION}_mips-3.4-kn.ipk"
          test -f "$checkdir/awg-manager_${VERSION}_aarch64-3.10-kn.ipk"
          test "$(tr -d '\r\n' < "$checkdir/VERSION")" = "$VERSION"

  already-published:
    name: Release already exists
    runs-on: ubuntu-latest
    needs: [version, release-check]
    if: needs.release-check.outputs.release_exists == 'true'
    steps:
      - name: Skip because release already exists
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Release $TAG (version $VERSION) already exists."
          echo "Skipping build, test, and publish because the release was created manually by the user."
